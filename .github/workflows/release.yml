name: Release

on:
  push:
    tags: ["v*"]

jobs:
  e2e:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Meson and Ninja
        run: pip install meson ninja

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Gates the release: a wrap set that generates fine but does not
      # actually work with Meson must not get published. See
      # tests/e2e_meson.rs.
      - name: Run the real Meson end-to-end test
        run: cargo test --test e2e_meson -- --ignored

  build:
    needs: e2e
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../meson-jll-${{ matrix.target }}.tar.gz meson-jll

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/meson-jll.exe -DestinationPath meson-jll-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: meson-jll-${{ matrix.target }}
          path: meson-jll-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*

  # Publishes the crate to crates.io. Gated on the same end-to-end test as
  # the binary release, so a version that does not actually work with Meson
  # is never published under either channel. Kept separate from the GitHub
  # release job so a crates.io hiccup does not block the binary artifacts,
  # and vice versa. Needs a CARGO_REGISTRY_TOKEN secret with publish rights.
  publish-crate:
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Refuses to publish if the tag and the crate version disagree, so a
      # mistyped tag fails loudly here rather than publishing the wrong
      # version. The tag is vX.Y.Z, the manifest version is X.Y.Z.
      - name: Check the tag matches the crate version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          if [ "$tag" != "$crate" ]; then
            echo "tag $GITHUB_REF_NAME does not match crate version $crate" >&2
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
